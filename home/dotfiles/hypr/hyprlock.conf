# Minimal hyprlock: blurred screenshot + password field.
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    outer_color = rgba(33ccffee)
    inner_color = rgba(1a1b26ee)
    font_color = rgba(c0caf5ff)
    placeholder_text = ...
    fade_on_empty = true
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    color = rgba(c0caf5ff)
    position = 0, 80
    halign = center
    valign = center
}
