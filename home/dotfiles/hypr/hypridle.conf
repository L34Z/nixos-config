general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl keyword monitor "HDMI-A-2, 1920x1080@60, 2560x0, 1"; hyprctl dispatch dpms on
}

# Lock after 10 min idle
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Screen off after 15 min. The Dell P2219H (HDMI-A-2) hotplug-cycles every
# ~5s while in DPMS standby, which wedges hyprlock/Hyprland overnight, so
# disable that output entirely instead of just dpms off.
listener {
    timeout = 900
    on-timeout = hyprctl keyword monitor "HDMI-A-2, disable"; hyprctl dispatch dpms off
    on-resume = hyprctl keyword monitor "HDMI-A-2, 1920x1080@60, 2560x0, 1"; hyprctl dispatch dpms on
}
