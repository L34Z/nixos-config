# Ported from the old setup, with syntax updated for current Hyprland:
# - drop_shadow/shadow_* moved into the shadow {} block
# - windowrule/windowrulev2 unified
# - no_gaps_when_only removed (now a workspace rule, see below)
# - workspace monitor binding syntax fixed (window: -> monitor:)
# - swww/dunst/openrazer/mullvad removed; hyprpaper/swaync/hypridle in


################
### MONITORS ###
################

monitor = DP-2,2560x1440@239.96Hz,auto,auto
monitor = Unknown-1, disable


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = ranger
$menu = rofi -show drun   # old launcher script wasn't saved; plain rofi for now
$browser = firefox
$pass = 1password --ozone-platform-hint=wayland

# Layer Rules
layerrule = blur, waybar
layerrule = blurpopups, waybar
layerrule = ignorealpha 0.2, waybar


#################
### AUTOSTART ###
#################

exec-once = waybar & swaync & hyprpaper
# 1Password in the tray; must be running for the SSH agent socket to exist
exec-once = 1password --silent

exec-once = [workspace special:btop silent] $terminal btop
exec-once = [workspace special:ranger silent] $terminal ranger
exec-once = [workspace special:terminal silent] $terminal


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 0

    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 5

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# replacement for the removed no_gaps_when_only = 1:
workspace = w[tv1], gapsout:0, gapsin:0


#############
### INPUT ###
#############

input {
    kb_layout = us

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# (gestures block removed: reworked out of Hyprland in 0.51, no touchpad here)


####################
### KEYBINDINGS  ###
####################

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, K, killactive,
bind = $mainMod, END, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod, L, exec, hyprlock

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = float, class:^(1Password)$
windowrule = suppressevent maximize, class:.*

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2


######## SPECIAL WORKSPACES #########

# Terminal Workspace
bind = $mainMod SHIFT, BACKSPACE, exec, [workspace special:terminal] $terminal
bind = $mainMod, BACKSPACE, togglespecialworkspace, terminal

# Magic workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Hyprland Config
bind = $mainMod ALT, H, exec, [workspace special:hconf] $terminal nvim ~/nixos/home/dotfiles/hypr/hyprland.conf

# Nix Config
bind = $mainMod ALT, N, exec, [workspace special:nconf] $terminal nvim ~/nixos

# Fish Alias Config
bind = $mainMod ALT, A, exec, [workspace special:aconf] $terminal nvim ~/nixos/home/dotfiles/fish/aliases.fish

# BTOP Workspace
bind = $mainMod, ESCAPE, togglespecialworkspace, btop
bind = $mainMod SHIFT, ESCAPE, exec, [workspace special:btop] $terminal btop

# Ranger Workspace
bind = $mainMod, R, togglespecialworkspace, ranger
bind = $mainMod SHIFT, R, exec, [workspace special:ranger] $terminal ranger

# Pavucontrol
bind = $mainMod, A, togglespecialworkspace, audio
bind = $mainMod SHIFT, A, exec, [workspace special:audio] pavucontrol

# 1Password
bind = $mainMod, P, exec, $pass

bind = $mainMod CTRL, END, exec, [workspace special:off] $terminal sudo shutdown now

# Screenshots -> clipboard (region / full screen)
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, PRINT, exec, grim - | wl-copy


# TEMPORARY (wtype snippets)

bind = CTRL SHIFT, PERIOD, exec, wtype "‣"
bind = CTRL SHIFT, RIGHT, exec, wtype "→"
bind = CTRL SHIFT, bracketleft, exec, wtype "/user/yr"
bind = CTRL SHIFT, bracketright, exec, wtype "/user/mo"
bind = CTRL SHIFT, Y, exec, wtype "Yearly → "
bind = CTRL SHIFT, M, exec, wtype "Monthly → "
bind = CTRL SHIFT, 0, exec, wtype ".00"
bind = CTRL SHIFT, MINUS, exec, wtype "───"
